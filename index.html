<!doctype html>
<html lang="hr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#7d2438">
    <title>Popis stolova</title>
    <link rel="preload" href="assets/floral-band.svg" as="image">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <span>M</span><span class="brand-amp">&amp;</span><span>K</span>
        </span>
        <div>
          <p class="kicker">Svadbeni raspored</p>
          <h1>Popis stolova</h1>
        </div>
      </div>

      <form class="search" id="searchForm" autocomplete="off">
        <label for="guestSearch">Pronađi svoj stol</label>
        <div class="search-box">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="m21 21-4.35-4.35m2.1-5.4a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z"></path>
          </svg>
          <input
            id="guestSearch"
            name="guest"
            type="search"
            placeholder="Upiši ime ili prezime"
            aria-describedby="searchStatus"
          >
          <button type="submit" aria-label="Pretraži">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M5 12h14m-6-6 6 6-6 6"></path>
            </svg>
          </button>
        </div>
        <div class="results" id="results" hidden></div>
        <p class="status" id="searchStatus" role="status"></p>
      </form>
    </header>

    <main>
      <section class="intro" aria-labelledby="introTitle">
        <div class="intro-copy">
          <p class="kicker">Dobrodošli</p>
          <h2 id="introTitle">Pronađite stol i uživajte u slavlju</h2>
          <p>Upišite ime ili prezime u pretragu. Stranica će vas odvesti na odgovarajući stol i označiti pronađeno ime.</p>
        </div>
        <img src="assets/floral-band.svg" alt="" aria-hidden="true">
      </section>

      <section class="summary" aria-label="Sažetak rasporeda">
        <div>
          <span id="guestCount">0</span>
          <p>gostiju</p>
        </div>
        <div>
          <span id="tableCount">0</span>
          <p>stolova</p>
        </div>
      </section>

      <section class="tables" id="tables" aria-label="Popis stolova"></section>
    </main>

    <button class="back-to-top" id="backToTop" type="button" aria-label="Na vrh">
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <path d="m18 15-6-6-6 6"></path>
      </svg>
    </button>

    <script src="tables-data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
